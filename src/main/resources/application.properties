spring.application.name=NguyenVoXuanDuong

spring.datasource.url=jdbc:mysql://localhost:3306/webbanhang?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.platform=mysql

# Base URL for payment callbacks (set APP_BASE_URL when running on different host/port)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# MoMo real gateway configuration (test environment)
# Luu y: MomoService hien dang su dung API v2 (/v2/gateway/api/create).
momo.partner-code=${MOMO_PARTNER_CODE:MOMO}
momo.access-key=${MOMO_ACCESS_KEY:F8BBA842ECF85}
momo.secret-key=${MOMO_SECRET_KEY:K951B6PE1waDMi640xX08PD3vg6EkVlz}
momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
momo.redirect-url=${MOMO_REDIRECT_URL:${app.base-url}/momo/return}
momo.ipn-url=${MOMO_IPN_URL:${app.base-url}/momo/ipn}
momo.request-type=${MOMO_REQUEST_TYPE:captureWallet}

# VNPay sandbox configuration
# IMPORTANT: set real VNPay sandbox credentials from merchant portal, do not use placeholder values.
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:${app.base-url}/vnpay/return}
vnpay.ipn-url=${VNPAY_IPN_URL:${app.base-url}/vnpay/ipn}

# OTP email delivery configuration
otp.email.enabled=${OTP_EMAIL_ENABLED:false}
otp.email.from=${OTP_EMAIL_FROM:}

# SMTP (example: Gmail app password)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
