<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Add Product</title>
</head>

<body>
    <section layout:fragment="content">
        <div class="crud-section" style="max-width: 800px; margin: 0 auto; margin-top: 20px;">
            <h1 class="crud-header">Add New Product</h1>
            <form th:action="@{/products/add}" th:object="${product}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="name" class="form-label">Name:</label>
                    <input type="text" th:field="*{name}" class="form-control" id="name" required
                        placeholder="Product Name">
                    <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label for="price" class="form-label">Price:</label>
                    <input type="text" th:field="*{price}" class="form-control" id="price" required placeholder="Price">
                </div>
                <div class="mb-3">
                    <label for="imageFile" class="form-label">Image:</label>
                    <input type="file" name="imageFile" class="form-control" id="imageFile" accept="image/*">
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label">Category:</label>
                    <select name="category" class="form-control" id="category">
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description:</label>
                    <textarea th:field="*{description}" class="form-control" id="description" required rows="4"
                        placeholder="Product Description"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        <input type="checkbox" th:field="*{promotional}" id="isPromotional" style="margin-right: 10px;">
                        Sản phẩm khuyến mãi (Hiển thị ở tab khuyến mãi)
                    </label>
                </div>
                <div class="mb-3">
                    <label for="promotionalPrice" class="form-label">Giá khuyến mãi:</label>
                    <input type="number" step="0.01" min="0" th:field="*{promotionalPrice}" class="form-control"
                        id="promotionalPrice" placeholder="Giá áp dụng trong số lượng khuyến mãi">
                </div>
                <div class="mb-3">
                    <label for="promotionalStock" class="form-label">Số lượng khuyến mãi:</label>
                    <input type="number" min="0" th:field="*{promotionalStock}" class="form-control"
                        id="promotionalStock" placeholder="Ví dụ: 10">
                </div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Add Product</button>
                    <a th:href="@{/products}" class="btn btn-link">Cancel</a>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
