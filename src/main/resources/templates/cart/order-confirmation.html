<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{layout}">
<head>
 <title th:text="${title} ?: 'Order Confirmation'">Order Confirmation</title>
 <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<section layout:fragment="content" class="container mt-3">
 <h1>Order Confirmation</h1>
 <p th:text="${message}"></p>
 <div class="card" th:if="${order != null}">
  <div class="card-header">Thông tin đơn hàng</div>
  <div class="card-body">
   <p><strong>Mã đơn:</strong> <span th:text="${order.id}"></span></p>
   <p><strong>Khách hàng:</strong> <span th:text="${order.customerName}"></span></p>
    <p><strong>Số điện thoại:</strong> <span th:text="${order.customerPhone}"></span></p>
   <p><strong>Phương thức:</strong> <span th:text="${order.paymentMethod}"></span></p>
   <p><strong>Trạng thái thanh toán:</strong> <span th:text="${order.paymentStatus}"></span></p>
   <hr>
   <p><strong>Tổng tiền hàng:</strong> <span th:text="${#numbers.formatDecimal(order.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
   <p><strong>Giảm giá khuyến mãi:</strong> <span th:text="${#numbers.formatDecimal(order.promotionDiscount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
    <p><strong>Giảm voucher:</strong> <span th:text="${#numbers.formatDecimal(order.voucherDiscount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
    <p><strong>Mã voucher:</strong> <span th:text="${order.voucherCode == null || #strings.isEmpty(order.voucherCode) ? 'Khong dung' : order.voucherCode}"></span></p>
   <p><strong>Giảm giá điểm:</strong> <span th:text="${#numbers.formatDecimal(order.pointsDiscount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
   <p><strong>Phí ship:</strong> <span th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
   <p><strong>Điểm đã dùng:</strong> <span th:text="${order.usedPoints}"></span></p>
   <p><strong>Điểm nhận thêm:</strong> <span th:text="${order.earnedPoints}"></span></p>
   <h4><strong>Thanh toán cuối:</strong> <span th:text="${#numbers.formatDecimal(order.finalTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></h4>
  </div>
 </div>
</section>
</body>
</html>
