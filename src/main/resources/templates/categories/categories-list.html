<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="~{layout}">

<head>
    <title th:text="${title} ?: 'Categories Management'"> Categories Management </title>
</head>

<body>
    <section layout:fragment="content">
        <div class="crud-section">
            <div class="crud-header">
                <h1>Categories List</h1>
            </div>

            <div th:if="${error}" class="text-danger" style="margin-bottom: 12px; font-size: 14px;" th:text="${error}"></div>

            <div style="margin-bottom: 20px;" sec:authorize="hasAuthority('ADMIN')">
                <a th:href="@{/categories/add}" class="btn btn-primary">Add New Category</a>
            </div>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Level</th>
                        <th>Parent</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:each="root : ${rootCategories}">
                        <tr>
                            <td th:text="${root.id}"></td>
                            <td th:text="${root.name}"></td>
                            <td>Cấp 1</td>
                            <td>-</td>
                            <td sec:authorize="hasAuthority('ADMIN')">
                                <a th:href="@{/categories/edit/{id}(id=${root.id})}" class="btn btn-success"
                                    style="font-size: 12px; padding: 5px 10px;">Edit</a>
                                <a th:href="@{/categories/delete/{id}(id=${root.id})}" class="btn btn-danger"
                                    style="font-size: 12px; padding: 5px 10px;"
                                    onclick="return confirm('Are you sure?')">Delete</a>
                            </td>
                            <td sec:authorize="!hasAuthority('ADMIN')">-</td>
                        </tr>
                        <tr th:each="child : ${root.children}">
                            <td th:text="${child.id}"></td>
                            <td>
                                <span style="color: #999; margin-right: 6px;">↳</span>
                                <span th:text="${child.name}"></span>
                            </td>
                            <td>Cấp 2</td>
                            <td th:text="${root.name}"></td>
                            <td sec:authorize="hasAuthority('ADMIN')">
                                <a th:href="@{/categories/edit/{id}(id=${child.id})}" class="btn btn-success"
                                    style="font-size: 12px; padding: 5px 10px;">Edit</a>
                                <a th:href="@{/categories/delete/{id}(id=${child.id})}" class="btn btn-danger"
                                    style="font-size: 12px; padding: 5px 10px;"
                                    onclick="return confirm('Are you sure?')">Delete</a>
                            </td>
                            <td sec:authorize="!hasAuthority('ADMIN')">-</td>
                        </tr>
                    </th:block>
                </tbody>
            </table>
        </div>
    </section>
</body>

</html>
